  /api/v1/notifications/bulk-update/:
    post:
      operationId: v1_notifications_bulk_update_create
      description: |-
        Bulk update is_read status for a list of notification IDs.
        Expected payload:
        {
            "notification_ids": [1, 2, 3],
            "is_read": true
        }
      summary: Bulk update notification read status
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              BulkUpdateExample:
                value:
                  notification_ids:
                  - 1
                  - 2
                  - 3
                  is_read: true
                summary: Bulk update example
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
