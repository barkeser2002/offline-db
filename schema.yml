                  value:
                    notification_ids:
                    - 1
                    - 2
                    - 3
                    is_read: true
                  summary: Bulk update example
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
