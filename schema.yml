components:
  schemas:
    AnimeCharacter:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        character:
          allOf:
          - $ref: '#/components/schemas/Character'
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        voice_actor_name:
          type: string
          maxLength: 255
        voice_actor_language:
          type: string
          maxLength: 50
      required:
      - character
      - id
    AnimeDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mal_id:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
          title: MyAnimeList ID
        title:
          type: string
          maxLength: 255
        japanese_title:
          type: string
          maxLength: 255
        english_title:
          type: string
          maxLength: 255
        synopsis:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        banner_image:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
          nullable: true
          title: MAL Score
        rank:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
          title: MAL Rank
        popularity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        members:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
          title: MAL Members
        studio:
          type: string
          maxLength: 255
        source:
          type: string
          description: Manga, Light Novel, Original, etc.
          maxLength: 100
        status:
          oneOf:
          - $ref: '#/components/schemas/StatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
        aired_from:
          type: string
          format: date
          nullable: true
        aired_to:
          type: string
          format: date
          nullable: true
        total_episodes:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        duration:
          type: string
          description: e.g., '24 min per ep'
          maxLength: 50
        rating:
          type: string
